name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Clone original repo
        run: |
          git clone https://github.com/jstrieb/github-stats.git stats-builder
          # 把背景色改成透明
          sed -i 's/fill="white"/fill="none"/g' stats-builder/templates/*.svg
          sed -i 's/fill="#fff"/fill="none"/g' stats-builder/templates/*.svg
          sed -i 's/fill="#FFFFFF"/fill="none"/g' stats-builder/templates/*.svg
          # 增加 202 重试
          sed -i 's/for _ in range(60):/for _ in range(300):/' stats-builder/github_stats.py
          sed -i 's/await asyncio.sleep(2)/await asyncio.sleep(4)/' stats-builder/github_stats.py

      - name: Install dependencies
        run: |
          pip install -r stats-builder/requirements.txt

      - name: Generate Stats
        env:
          ACCESS_TOKEN: ${{ secrets.PAT }}
        run: |
          cd stats-builder
          python generate_images.py
          cp generated/overview.svg generated/languages.svg ../
          cd ..
          rm -rf stats-builder

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add -A
          git diff-index --quiet HEAD || git commit -m "Update GitHub Stats SVGs"
          git push
